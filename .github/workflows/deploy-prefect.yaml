name: Deploy Prefect flow

on:
  push:
    branches:
      - prefect_deploy #TODO: Change to main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      DATABASE_NAME: ${{ secrets.PROD_DATABASE_NAME }}
      DATABASE_USER: ${{ secrets.PROD_DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.PROD_DATABASE_PASSWORD }}
      DATABASE_HOST: ${{ secrets.PROD_DATABASE_HOST }}
      DATABASE_PORT: ${{ secrets.PROD_DATABASE_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prefect Deploy
        env:
          PREFECT_API_URL: ${{ secrets.PREFECT_API_URL }}
          PREFECT_API_AUTH_STRING: ${{ secrets.PREFECT_API_AUTH_STRING }}
        run: |
          pip install -r requirements.txt
          prefect deploy -n my-deployment --prefect-file automation/prefect.yaml
